<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- full square bg so QuickLook square canvas is filled; content sits in centered 630 band (y 285..915) -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="1050" cy="405" r="260" fill="#38bdf8" opacity="0.08"/>
  <circle cx="150" cy="845" r="220" fill="#818cf8" opacity="0.08"/>

  <!-- React atom mark -->
  <g transform="translate(110,395)" stroke="url(#accent)" stroke-width="6" fill="none">
    <circle cx="45" cy="45" r="14" fill="#38bdf8" stroke="none"/>
    <ellipse cx="45" cy="45" rx="44" ry="17"/>
    <ellipse cx="45" cy="45" rx="44" ry="17" transform="rotate(60 45 45)"/>
    <ellipse cx="45" cy="45" rx="44" ry="17" transform="rotate(120 45 45)"/>
  </g>

  <text x="235" y="435" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#e2e8f0">React Router Demo</text>

  <text x="110" y="615" font-family="Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#f8fafc">Учимся React</text>
  <text x="110" y="703" font-family="Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="url(#accent)">по-настоящему</text>

  <text x="110" y="785" font-family="Helvetica, Arial, sans-serif" font-size="29" fill="#94a3b8">Компоненты · состояние · контекст · эффекты · роутинг · рефы</text>

  <g font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#cbd5e1">
    <text x="110" y="850">🎨 Темы</text>
    <text x="270" y="850">🌍 2 языка</text>
    <text x="470" y="850">🧩 Компоненты</text>
    <text x="710" y="850">🧭 Роутинг</text>
  </g>

  <rect x="0" y="905" width="1200" height="10" fill="url(#accent)"/>
</svg>
